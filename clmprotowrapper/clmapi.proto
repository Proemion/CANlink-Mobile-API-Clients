syntax = "proto2";

/* This protocol definition corresponds to CLM10000 release 3.3.0 */
package clmproto;

/* Result codes.
 *
 * The `enum result_code` defines codes which can be returned by the
 * application in a response message.
 */
enum result_code
{
    /* The message received by the application is not known, perhaps one of the
     * parties is using a different protocol version, where the new message
     * has not yet been defined. */
    RC_ERR_UNKNOWN_MSG = 0;

    /* No error, typically this will be the normal "ack" response when
     * everything worked as expected. */
    RC_OK = 1;

    /* The constructed message is invalid. This could also indicate a protocol
     * mismatch, for instance when various types/enum values were not
     * understood by the application. */
    RC_ERR_INVALID_MSG = 2;

    /* The application encountered an out of memory condition. */
    RC_ERR_NOMEM = 3;

    /* Request could not be served due to an internal application error, at
     * this point it might be worth it to review the logs as something
     * unexpected might have happened. */
    RC_ERR_INTERNAL = 4;

    /* Request contained configuration that could not be applied. */
    RC_ERR_CONFIG = 5;

    /* Configuration option is not known, this could again indicate a protocol
     * mismatch between the client and the application. */
    RC_ERR_UNKNOWN_OPTION = 6;
};

/* The enum describes events which caused the device to boot. */
enum wake_up_reason
{
    /* Reserved, do not use. */
    WAKE_UP_REASON_RESERVED = 0;

    /* System boot was triggered by CLAMP15. */
    WAKE_UP_REASON_CLAMP15 = 1;

    /* System boot was triggered by CLAMP30. */
    WAKE_UP_REASON_CLAMP30 = 2;

    /* System boot was triggered by the CAN1 interface. */
    WAKE_UP_REASON_CAN1 = 3;

    /* System boot was triggered by the CAN2 interface. */
    WAKE_UP_REASON_CAN2 = 4;

    /* System boot was triggered by the CAN3 interface. */
    WAKE_UP_REASON_CAN3 = 5;

    /* System boot was triggered by an accelerometer event. */
    WAKE_UP_REASON_ACCELEROMETER = 6;

    /* The real-time interval wakes the system up after a specified time has
     * elapsed since shutdown. */
    WAKE_UP_REASON_RTC_INTERVAL = 7;

    /* The real-time clock alarm wakes the system up at a specific time of
     * day - daily or on specific days. */
    WAKE_UP_REASON_RTC_ALARM = 8;

    /* The system performed reboot/SW reset after the firmware update. */
    WAKE_UP_REASON_REBOOT = 9;
};

/* Connection state of a remote machine tunnel service. */
enum remote_machine_tunnel_connection_state
{
    /* Reserved, do not use */
    RMT_CONNECTION_STATE_RESERVED = 0;

    /* Initial or unknown state */
    RMT_CONNECTION_STATE_UNKNOWN = 1;

    /* Connection in progress */
    RMT_CONNECTION_STATE_CONNECTING = 2;
    /* Successfully connected and operational */

    RMT_CONNECTION_STATE_CONNECTED = 3;
    /* Connection has been lost or terminated */

    RMT_CONNECTION_STATE_DISCONNECTED = 4;

    /* Currently attempting to reestablish connection */
    RMT_CONNECTION_STATE_RECONNECTING = 5;
}

/* Error type of a remote machine tunnel service. */
enum remote_machine_tunnel_error_type
{
    /* Reserved, do not use */
    RMT_ERROR_TYPE_RESERVED = 0;

    /* Error with unknown or undetermined cause */
    RMT_ERROR_TYPE_UNKNOWN_ERROR = 1;

    /* Failed to resolve the remote address */
    RMT_ERROR_TYPE_RESOLUTION_ERROR = 2;

    /* Failed to establish connection to the remote server */
    RMT_ERROR_TYPE_CONNECTION_ERROR = 3;

    /* Protocol-level error during communication */
    RMT_ERROR_TYPE_PROTOCOL_ERROR = 4;

    /* Authentication failed */
    RMT_ERROR_TYPE_AUTH_ERROR = 5;

    /* Internal system error */
    RMT_ERROR_TYPE_INTERNAL_ERROR = 6;

    /* Heartbeat timeout */
    RMT_ERROR_TYPE_HEARTBEAT_TIMEOUT = 7;
}

/* State of the remote machine tunnel client. */
enum remote_machine_tunnel_client_state
{
    /* Reserved, do not use */
    RMT_CLIENT_STATE_RESERVED = 0;

    /* Initial or unknown state */
    RMT_CLIENT_STATE_UNKNOWN = 1;

    /* The client service is disabled */
    RMT_CLIENT_STATE_NOT_RUNNING = 2;

    /* The client service is running */
    RMT_CLIENT_STATE_RUNNING = 3;

    /* Failed to start the client */
    RMT_CLIENT_STATE_ERROR = 4;
}


/* Hardware configuration state */
message hardware_configuration
{
    optional bool with_battery = 1;
    optional bool with_wifi = 2;
};

/* This message is sent out by the device each time a new connection with a
 * communication party is established. */
message device_info_notification
{
    /* NextID: 8 */

    /* Current firmware version. */
    optional string firmware_version = 1;

    /* Timestamp of the last firmware update in milliseconds from epoch. */
    optional uint64 firmware_update_time_ms = 2;

    /* String identifying the OEM firmware variant. */
    optional string oem_variant = 3;

    /* Hardware version string: `<hardware version> <product code>`. For
     * example Hw 0.0 0100A666 */
    optional string hardware_version = 4;

    /* Information which event caused the device to boot */
    optional wake_up_reason wake_up_reason = 5;

    /* API compatibility indicator, see `CFG_OPTION_UINT16_API_COMPATIBILITY`
     * for more details. */
    optional uint32 api_compatibility = 6;

    /* Information about the device's hardware configuration */
    optional hardware_configuration hardware_configuration = 7;

    /* Current configuration name. */
    optional string config_name = 8;

    /* Current configuration version. */
    optional string config_version = 9;

    /* Timestamp of the last configuration update in milliseconds from epoch. */
    optional uint64 config_update_time_ms = 10;
}

/* Notification about a firmware update on the device.
 *
 * This message is broadcasted to all connected clients as well as to the
 * Proemion Data Portal each time a firmware update has been either attempted
 * or performed. */
message device_firmware_update_notification
{
    /* Indicator if the update was successful or not. */
    optional bool success = 1;

    /* Human readable update result or error message. */
    optional string update_message = 2;

    /* Currently running firmware version, i.e. the firmware version that was
     * performing the update. */
    optional string firmware_version_before_update = 3;

    /* Firmware version of the update. */
    optional string target_firmware_version = 4;

    /* Timestamp of the last firmware update in milliseconds from epoch. */
    optional uint64 firmware_update_time_ms = 5;
}


/* Device configuration update notification.
 *
 * This message is broadcasted to all connected clients as well as to the
 * Proemion Data Portal each time a configuration update has been either
 * attempted or performed. */
message device_config_update_notification
{
    /* Indicator if the update was successful. */
    optional bool success = 1;

    /* Human readable update result message/error message. */
    optional string update_message = 2;


    /* Timestamp of the last config update in milliseconds from epoch. */
    optional uint64 config_update_time_ms = 4;

    /* Configuration name defined by the user via the DataPlatform */
    optional string config_name = 5;

    /* Configuration version, it is defined from the CLM10000
     * and is part of the configuration file */
    optional string config_version = 6;
}

/* Remote machine tunnel error info */
message remote_machine_tunnel_error
{
    /* Error type */
    optional remote_machine_tunnel_error_type type = 1;

    /* Error description */
    optional string description = 2;

    /* Unix timestamp when the error occurred */
    optional uint64 timestamp = 3;
}

/* Remote machine tunnel service state */
message state_remote_machine_tunnel_service
{
    /* The name of the service as configured */
    optional string name = 1;

    /* Local address that's being forwarded */
    optional string local_address = 2;

    /* Current connection state of the control channel */
    optional remote_machine_tunnel_connection_state connection_state = 3;

    /* Unix timestamp of the last successful heartbeat */
    optional uint64 last_heartbeat = 4;

    /* Details about the last connection error */
    optional remote_machine_tunnel_error last_error = 5;

    /* Total bytes received for this service */
    optional uint64 bytes_in = 6;

    /* Total bytes sent for this service */
    optional uint64 bytes_out = 7;
}

 /* Remote machine tunnel state */
 message state_remote_machine_tunnel
 {
    /* Remote machine tunnel services */
    repeated state_remote_machine_tunnel_service services = 1;

    /* State of the remote machine tunnel client */
    optional remote_machine_tunnel_client_state client_state = 2;

    /* Unique session identifier in uuid format */
    optional string session_id = 3;

    /* Total bytes received across all services */
    optional uint64 bytes_in = 4;

    /* Total bytes sent across all services */
    optional uint64 bytes_out = 5;
 }

/* Configuration options
 *
 * Configuration options carry the actual values that can be applied to the
 * device. The naming scheme always hints the data type as well as group
 * membership, followed by the option name. Exception to the rule are options
 * of `CFG_GROUP_OTHER`, there the group hint is omitted from the option name.
 *
 * Example of the naming scheme: `CFG_OPTION_[datatype]_[group]_[option name]`
 *
 * Below is the list of all known options at the time of writing, new firmware
 * versions may introduce more groups and more options.
 */
enum cfg_option
{
    /* NextID: 156 */

    /* Reserved, do not use. */
    CFG_OPTION_RESERVED = 0;

    /*   - Data type: _string_
     *   - Default value: IMEI, retrieved from the modem
     *   - Group membership: `CFG_GROUP_DP`
     *
     *   Communication unit ID by which the device identifies itself with the
     *   server, typically the IMEI. */
    CFG_OPTION_STR_DP_CU_ID = 1;

    /*   - Data type: _string_
     *   - Default value: _mqtt.proemion.com_
     *   - Group membership: `CFG_GROUP_DP`
     *
     *   The server address, typically this should be left at the
     *   default setting. */
    CFG_OPTION_STR_DP_ADDRESS = 2;

    /*   - Data type: _uint16_t_
     *   - Default value: _8883_
     *   - Group membership: `CFG_GROUP_DP`
     *
     *   The server port, typically this should be left at the
     *   default setting. */
    CFG_OPTION_UINT16_DP_PORT = 3;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_DP`
     *
     *   Automatically upload files to the server which were received via
     *   local HTTP POST. When disabled, files will be stored on the device as
     *   long as dedicated flash space is available. */
    CFG_OPTION_BOOL_DP_AUTO_UPLOAD_ENABLED = 4;

    /*   - Data type: _string_
     *   - Default value: _https<area>://transfers.proemion.com/fromMachine_
     *   - Group membership: `CFG_GROUP_DP`
     *
     *   The server URL where the device should POST its files to when
     *   uploading, typically this should be left at the default setting. */
    CFG_OPTION_STR_DP_UPLOAD_URL = 5;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_ACCESS`
     *
     *   Generally allow or disallow local file uploads to the device. */
    CFG_OPTION_BOOL_ACCESS_LOCAL_UPLOAD_ENABLED = 6;

    /* This option is no longer supported. */
    CFG_OPTION_BOOL_ACCESS_LOCAL_UPLOAD_PASSWORD_ENABLED = 7;

    /* This option is no longer supported. */
    CFG_OPTION_BOOL_ACCESS_LOCAL_UPLOAD_HTTP_ENABLED = 8;


    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_IF_MODEM`
     *
     *   This option allows to enable or disable the modem interface. Note,
     *   that this option controls the modem interface as a whole, meaning
     *   that it will disable the modem regardless of individual connection
     *   profile settings. */
    CFG_OPTION_BOOL_IF_MODEM_ENABLED = 17;

    /*   - Data type: _string_
     *   - Default value: _Mobile connection_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Modem connection profile name, must be globally unique regardless of
     *   interface.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_CONNECTION_NAME = 18;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Connect this profile automatically when the resources for this
     *   connection become available. When set to false the profile will be
     *   "parked" in the configuration, but not actively used.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_BOOL_IF_MODEM_AUTOCONNECT = 19;

    /*   - Data type: _int32_t_
     *   - Default value: _0_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Priority for profiles that are configured to auto connect, this
     *   setting spans over all profiles of all interfaces where the
     *   autoconnect setting is set to true. A higher number means higher
     *   priority.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT32_IF_MODEM_AUTOCONNECT_PRIO = 20;

    /*   - Data type: _int32_t_
     *   - Default value: _0_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Number of times to retry to connect the profile automatically before
     *   giving up. When autoconnection fails after the given number of 
     *   retries, the next highest priority profile will be used. A value of
     *   zero means retry forever.
     *
     *   **Note:** when autoconnection fails due to the retries being exceeded,
     *   NetworkManager will still try again after a certain timeout.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT32_IF_MODEM_AUTOCONNECT_RETRIES = 21;

    /*   - Data type: _string_
     *   - Default value: _mobile.iot.ifm_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Access point name for establishing data sessions with the mobile
     *   network.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_APN = 22;

    /*   - Data type: _string_
     *   - Default value: none
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Password used to authenticate with the mobile network (if required),
     *   not set by default.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_PASSWORD = 23;

    /*   - Data type: _string_
     *   - Default value: none
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   User name used to authenticate with the GSM network (if required), not
     *   set by default.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_USERNAME = 24;

    /*   - Data type: _bool_
     *   - Default value: _false_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Allow only connections to the home network, disallow roaming.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_BOOL_IF_MODEM_HOME_ONLY = 25;

    /*   - Data type: _bool_
     *   - Default value: _false_
     *   - Group membership: `CFG_GROUP_SIM`
     *
     *   Enable or disable SIM card PIN code. */
    CFG_OPTION_BOOL_SIM_PIN_ENABLED = 26;

    /*   - Data type: _string_
     *   - Default value: none
     *   - Group membership: `CFG_GROUP_SIM`
     *
     *   PIN code needed to unlock the SIM card if the PIN is enabled. */
    CFG_OPTION_STR_SIM_CURRENT_PIN = 27;


    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   DNS Server address 1.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_IPV4_DNS1 = 28;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   DNS Server address 2.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_IPV4_DNS2 = 29;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   DNS Server address 3.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_MODEM_IPV4_DNS3 = 30;

    /*   - Data type: _int64_t_
     *   - Default value: _-1_
     *   - Group membership: `CFG_GROUP_IF_MODEM_PROFILE`
     *
     *   Routing metric, lower values have higher priority. Set to -1 for
     *   automatic assignment based on interface type. This option will allow
     *   you to prioritize one interface over the other when accessing the
     *   internet, depending on interface or connection availability.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT64_IF_MODEM_IPV4_ROUTE_METRIC = 31;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET`
     *
     *   This option allows to enable or disable the Ethernet interface.
     *
     *   **Note:** this option controls the whole device, meaning that it will
     *   disable the Ethernet regardless of individual connection profile
     *   settings. */
    CFG_OPTION_BOOL_IF_ETHERNET_ENABLED = 32;

    /*   - Data type: _string_
     *   - Default value: _Wired connection_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Ethernet connection profile name, must be globally unique regardless
     *   of interface.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_CONNECTION_NAME = 33;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Connect this profile automatically when the resources for this
     *   connection become available. When set to false the profile will be
     *   "parked" in the configuration, but not actively used.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_BOOL_IF_ETHERNET_AUTOCONNECT = 34;

    /*   - Data type: _int32_t_
     *   - Default value: _0_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Priority for profiles that are configured to auto connect, this
     *   setting spans over all profiles of all interfaces where the
     *   autoconnect setting is set to true. A higher number means higher
     *   priority.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT32_IF_ETHERNET_AUTOCONNECT_PRIO = 35;

    /*   - Data type: _int32_t_
     *   - Default value: _0_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Number of times to retry to connect the profile automatically before
     *   giving up. When autoconnection fails after the given number of
     *   retries, the next highest priority profile will be used. A value of
     *   zero means retry forever.
     *
     *   **Note:** when autoconnection fails due to the retries being exceeded,
     *   NetworkManager will still try again after a certain timeout.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT32_IF_ETHERNET_AUTOCONNECT_RETRIES = 36;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   DNS Server address 1.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_DNS1 = 37;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   DNS Server address 2.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_DNS2 = 38;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   DNS Server address 3.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_DNS3 = 39;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   IP address used for either static IP or DHCP server configurations.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_ADDRESS = 40;

    /*   - Data type: _string_
     *   - Default value: _link-local_
     *   - Allowed values: _disabled_, _auto_, _manual_, _link-local_, _shared_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   IP configuration method, by default the interface is set to use
     *   _link-local_, i.e. auto-ip configuration which makes sure that the
     *   device does not disrupt an existing network when plugged in.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_METHOD = 41;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   First DHCP pool IP address when selecting _shared_ IPv4 method.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls */
     CFG_OPTION_STR_IF_ETHERNET_IPV4_DHCP_FIRST_ADDRESS = 141;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Last DHCP pool IP address when selecting _shared_ IPv4 method.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls */
     CFG_OPTION_STR_IF_ETHERNET_IPV4_DHCP_LAST_ADDRESS = 142;

    /*   - Data type: _string_
     *   - Default value: configured automatically
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Gateway IP address, usually only needs to be set when _manual_, i.e.
     *   static-ip network configuration method was selected.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_STR_IF_ETHERNET_IPV4_GATEWAY = 42;

    /*   - Data type: _int64_t_
     *   - Default value: _-1_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Routing metric, lower values have higher priority. Set to -1 for
     *   automatic assignment based on interface type. This option will allow
     *   you to prioritize one interface over the other when accessing the
     *   internet, depending on interface or connection availability.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_INT64_IF_ETHERNET_IPV4_ROUTE_METRIC = 43;
    
    /*   - Data type: _bool_
     *   - Default value: _false_
     *   - Group membership: `CFG_GROUP_IF_ETHERNET_PROFILE`
     *
     *   Enable or disable internet sharing when IPv4 method is set to shared.
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_BOOL_IF_ETHERNET_IPV4_INTERNET_SHARING_ENABLED = 153;

    /*   - Data type: _bool_
     *   - Default value: _true_
     *   - Group membership: `CFG_GROUP_IF_WIFI`
     *
     *   This option allows to enable or disable the wireless interface.
     *
