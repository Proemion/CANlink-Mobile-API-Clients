    /*   - Data type: _bytes_
     *   - Default value: not set
     *   - Group membership: `CFG_GROUP_IF_WIFI_PROFILE`
     *
     *   BSSID of the WiFi network.
     *
     *   **Note:** the SSID is usually a 1:1 string to bytes conversion where
     *   the SSID string `test` would get converted to a byte representation
     *   of `0x74 0x65 0x73 0x74` (i.e. ASCII codes of `test`). The BSSID
     *   however needs some processing, the user usually enters something
     *   like `001E42355F57` (or `00:1E:42:35:5F:57`), but NetworkManager does
     *   not expect individual characters as ASCII codes, instead the user
     *   input needs to be parsed as hex, so that the resulting
     *   byte array passed via the API would become:
     *   `0x00 0x1E 0x42 0x35 0x35 0x5F 0x57`
     *
     *   **Note:** this option belongs to a dynamic group and requires you to
     *   pass the associated group name in the respective calls. */
    CFG_OPTION_BYTES_IF_WIFI_BSSID = 54;

